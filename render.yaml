services:
  - type: web
    name: agentic-outreach
    runtime: python
    buildCommand: "pip install -r requirements.txt && cd frontend && npm install && npm run build"
    startCommand: python app.py
    envVars:
      - key: NVIDIA_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: NODE_VERSION
        value: 18.0.0
